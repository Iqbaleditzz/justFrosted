<svg width="320" height="180" viewBox="0 0 320 180" xmlns="http://www.w3.org/2000/svg">

  <!-- Truck Body -->
  <rect x="20" y="60" width="180" height="70" rx="10" fill="#2d89ef"/>

  <!-- Cabin -->
  <rect x="200" y="80" width="80" height="50" rx="8" fill="#1b5fa7"/>

  <!-- Window -->
  <rect x="215" y="90" width="35" height="25" rx="4" fill="#cfe8ff"/>

  <!-- Cargo Lines -->
  <line x1="40" y1="75" x2="180" y2="75" stroke="#ffffff" stroke-width="2"/>
  <line x1="40" y1="95" x2="180" y2="95" stroke="#ffffff" stroke-width="2"/>
  <line x1="40" y1="115" x2="180" y2="115" stroke="#ffffff" stroke-width="2"/>

  <!-- Wheels -->
  <circle cx="80" cy="140" r="20" fill="#222"/>
  <circle cx="80" cy="140" r="10" fill="#888"/>

  <circle cx="230" cy="140" r="20" fill="#222"/>
  <circle cx="230" cy="140" r="10" fill="#888"/>

  <!-- Ground Shadow -->
  <ellipse cx="160" cy="160" rx="120" ry="10" fill="#000" opacity="0.1"/>

</svg>
