<svg width="240" height="240" viewBox="0 0 240 240" xmlns="http://www.w3.org/2000/svg">

  <!-- Background -->
  <rect width="240" height="240" rx="50" fill="#e6c9cf"/>

  <!-- Truck -->
  <g fill="none" stroke="#d85c7f" stroke-width="8" stroke-linecap="round" stroke-linejoin="round">

    <!-- Main cargo box -->
    <rect x="70" y="85" width="70" height="65" rx="14"/>

    <!-- Cabin -->
    <path d="
      M140 105
      H155
      Q160 105 164 110
      L180 130
      Q184 135 184 142
      V150
      Q184 158 176 158
      H150
    "/>

    <!-- Bottom base line -->
    <line x1="70" y1="150" x2="184" y2="150"/>

    <!-- Wheel arches (cut effect look) -->
    <path d="M90 150 A15 15 0 0 1 120 150"/>
    <path d="M140 150 A15 15 0 0 1 170 150"/>

  </g>

  <!-- Wheels -->
  <circle cx="105" cy="150" r="14" fill="#e6c9cf" stroke="#d85c7f" stroke-width="8"/>
  <circle cx="155" cy="150" r="14" fill="#e6c9cf" stroke="#d85c7f" stroke-width="8"/>

  <!-- Inner dots -->
  <circle cx="105" cy="150" r="4" fill="#d85c7f"/>
  <circle cx="155" cy="150" r="4" fill="#d85c7f"/>

</svg>
