<svg width="220" height="220" viewBox="0 0 220 220" xmlns="http://www.w3.org/2000/svg">

  <!-- Background -->
  <rect x="0" y="0" width="220" height="220" rx="40" fill="#e6c9cf"/>

  <!-- Truck Outline -->
  <g stroke="#d45b7c" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round">
    
    <!-- Cargo box -->
    <rect x="55" y="70" width="70" height="60" rx="10"/>

    <!-- Cabin -->
    <path d="M125 85 H145 L165 110 V130 H125 Z"/>

    <!-- Wheels -->
    <circle cx="85" cy="140" r="12"/>
    <circle cx="145" cy="140" r="12"/>

    <!-- Inner wheel dots -->
    <circle cx="85" cy="140" r="4" fill="#d45b7c" stroke="none"/>
    <circle cx="145" cy="140" r="4" fill="#d45b7c" stroke="none"/>

    <!-- Bottom line -->
    <line x1="55" y1="130" x2="165" y2="130"/>

  </g>

</svg>
